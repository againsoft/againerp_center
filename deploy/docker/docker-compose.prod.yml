# Full Control Center stack — API + Web + PostgreSQL + Redis
# Usage:
#   cp deploy/docker/.env.example deploy/docker/.env
#   docker compose -f deploy/docker/docker-compose.prod.yml up -d --build

services:
  postgres:
    image: postgres:16-alpine
    container_name: againerp-center-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-againerp_center}
    ports:
      - "5432:5432"
    volumes:
      - center_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-againerp_center}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: againerp-center-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - center_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../../apps/api
      dockerfile: Dockerfile
    container_name: againerp-center-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-againerp_center}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      MFA_ENFORCE: ${MFA_ENFORCE:-false}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  web:
    build:
      context: ../../apps/web
      dockerfile: Dockerfile
      args:
        API_PROXY_TARGET: http://api:8001
    container_name: againerp-center-web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      API_PROXY_TARGET: http://api:8001
      PORT: 3000
    ports:
      - "3000:3000"

volumes:
  center_pg_data:
  center_redis_data:
