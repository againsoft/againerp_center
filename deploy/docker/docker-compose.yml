services:
  postgres:
    image: postgres:16-alpine
    container_name: againerp-center-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: againerp_center
    ports:
      - "5432:5432"
    volumes:
      - center_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d againerp_center"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: againerp-center-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - center_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  center_pg_data:
  center_redis_data:
